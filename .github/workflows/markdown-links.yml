name: Markdown links (Lychee)

# Push to main: validate after merge. Pull requests: validate before merge (including forks).
# Feature-branch-only pushes do not run this workflow so WIP work stays quiet.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lychee:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose
            --no-progress
            --max-retries 3
            --retry-wait-time 2
            '**/*.md'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
